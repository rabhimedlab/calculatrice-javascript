<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <div class="phone-calculator">

        <h1>Calculator</h1>

        <button onclick="toggleTheme()" class="theme-btn">
           🌙 / ☀️
        </button>

        <div class="screen">
    <div id="status-line">
        <span id="operation-active"></span>
        <span id="memory-indicator"></span>
    </div>
    <div id="mini-display"></div>
    <div id="display">0</div>
    </div>

        <div class="buttons">

            <button onclick="racineCarree()" class="btn scientific">√</button>
            <button onclick="carre()" class="btn scientific">x²</button>
            <button onclick="ajouterPi()" class="btn scientific">π</button>
            <button onclick="changerSigne()" class="btn scientific">±</button>

            <button onclick="sinus()" class="btn scientific">sin</button>
            <button onclick="cosinus()" class="btn scientific">cos</button>
            <button onclick="tangente()" class="btn scientific">tan</button>
            <button onclick="logarithme()" class="btn scientific">log</button>

            <button onclick="changerModeAngle()" class="btn scientific" id="angle-mode">DEG</button>
            <button onclick="memoryAdd()" class="btn scientific">M+</button>
            <button onclick="memorySubtract()" class="btn scientific">M-</button>
            <button onclick="memoryRecall()" class="btn scientific">MR</button>
            <button onclick="memoryClear()" class="btn scientific">MC</button>
            <button onclick="clearDisplay()" class="btn special">C</button>
            <button onclick="pourcentage()" class="btn special">%</button>
            <button onclick="deleteLast()" class="btn special">⌫</button>

            <button onclick="appendNumber('7')" class="btn">7</button>
            <button onclick="appendNumber('8')" class="btn">8</button>
            <button onclick="appendNumber('9')" class="btn">9</button>
            <button onclick="chooseOperation('/')" class="btn operator">÷</button>

            <button onclick="appendNumber('4')" class="btn">4</button>
            <button onclick="appendNumber('5')" class="btn">5</button>
            <button onclick="appendNumber('6')" class="btn">6</button>
            <button onclick="chooseOperation('*')" class="btn operator">×</button>

            <button onclick="appendNumber('1')" class="btn">1</button>
            <button onclick="appendNumber('2')" class="btn">2</button>
            <button onclick="appendNumber('3')" class="btn">3</button>
            <button onclick="chooseOperation('-')" class="btn operator">−</button>

            <button onclick="appendNumber('0')" class="btn zero">0</button>
            <button onclick="appendNumber('.')" class="btn">.</button>
            <button onclick="calculate()" class="btn equal">=</button>
            <button onclick="chooseOperation('+')" class="btn operator">+</button>

        </div>

        <h2>Historique</h2>
        <button onclick="clearHistory()" class="clear-history-btn">
           Vider l’historique
        </button>
        <ul id="historique"></ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
